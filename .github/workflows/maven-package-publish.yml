name: Reusable Maven Package Publish

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: "25"

      working-directory:
        required: false
        type: string
        default: "."

      module:
        required: true
        type: string
    secrets:
      maven-packages-token:
        required: false
      MAVEN_PACKAGES_TOKEN:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish-maven-package:
    name: Publish Maven Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven
          server-id: github
          server-username: MAVEN_PACKAGES_USERNAME
          server-password: MAVEN_PACKAGES_TOKEN
        env:
          MAVEN_PACKAGES_USERNAME: ${{ github.actor }}
          MAVEN_PACKAGES_TOKEN: ${{ secrets['maven-packages-token'] || secrets.MAVEN_PACKAGES_TOKEN || github.token }}

      - name: Build and publish Maven module
        working-directory: ${{ inputs.working-directory }}
        run: |
          mvn -B -pl ${{ inputs.module }} -am clean deploy -DskipTests