name: Reusable Maven Package Publish

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: "25"

      working-directory:
        required: false
        type: string
        default: "."

      module:
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-maven-package:
    name: Publish Maven Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build and publish Maven module
        working-directory: ${{ inputs.working-directory }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B -pl ${{ inputs.module }} -am clean deploy -DskipTests