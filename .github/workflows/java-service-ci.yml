name: Java Service CI/CD

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: '25'

      working-directory:
        required: false
        type: string
        default: '.'

      image-name:
        required: true
        type: string

      dockerfile:
        required: false
        type: string
        default: "."

      docker-context:
        required: false
        type: string
        default: "."

      publish-image:
        required: false
        type: boolean
        default: true

      deploy:
        required: false
        type: boolean
        default: true

      deploy-container-name:
        required: false
        type: string
        default: ''

      deploy-image-name:
        required: false
        type: string
        default: ''

      deploy-run-options:
        required: false
        type: string
        default: '-p 80:8080'

      deploy-healthcheck-url:
        required: false
        type: string
        default: ''

      deploy-healthcheck-timeout-seconds:
        required: false
        type: number
        default: 60
permissions:
  contents: read
  packages: write

jobs:
  build-test-and-publish-image:
    name: Build, Test and Publish Image
    runs-on: ubuntu-latest
    env:
      MAVEN_PACKAGES_USERNAME: ${{ github.actor }}
      MAVEN_PACKAGES_TOKEN: ${{ secrets.MAVEN_PACKAGES_TOKEN || github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
         distribution: temurin
         java-version: ${{ inputs.java-version }}
         cache: maven
         server-id: github
         server-username: MAVEN_PACKAGES_USERNAME
         server-password: MAVEN_PACKAGES_TOKEN

      - name: Debug Maven package authentication
        shell: bash
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Actor: $GITHUB_ACTOR"
          echo "Maven settings exists: $(test -f "$HOME/.m2/settings.xml" && echo yes || echo no)"
          echo "Maven package username is set: $(test -n "$MAVEN_PACKAGES_USERNAME" && echo yes || echo no)"
          echo "Maven package token is set: $(test -n "$MAVEN_PACKAGES_TOKEN" && echo yes || echo no)"
          echo "Configured Maven server ids:"
          grep -o '<id>[^<]*</id>' "$HOME/.m2/settings.xml" || true
          echo "GitHub Packages auth check for core-api POM:"
          curl --silent --output /dev/null --write-out "HTTP %{http_code}\n" \
            --user "$MAVEN_PACKAGES_USERNAME:$MAVEN_PACKAGES_TOKEN" \
            "https://maven.pkg.github.com/UptimeHub/core/uz/uptimehub/core-api/0.0.6/core-api-0.0.6.pom"

      - name: Build and Test with Maven
        working-directory: ${{ inputs.working-directory }}
        run: mvn -B clean verify

      - name: Set image tags
        id: meta
        shell: bash
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_INPUT_LOWER=$(echo "${{ inputs.image-name }}" | tr '[:upper:]' '[:lower:]')
          REF_NAME_SAFE=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')
          
          IMAGE_NAME="ghcr.io/${OWNER_LOWER}/${IMAGE_INPUT_LOWER}"
          SHA_TAG="${IMAGE_NAME}:${{ github.sha }}"
          BRANCH_TAG="${IMAGE_NAME}:${REF_NAME_SAFE}"
          
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "branch_tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"
          
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "latest_tag=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "latest_tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Github Container Registry
        if: ${{ inputs.publish-image }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ inputs.publish-image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.branch_tag }}
            ${{ steps.meta.outputs.latest_tag }}

      - name: Print published image
        if: ${{ inputs.publish-image }}
        run: |
          echo "Published:"
          echo "${{ steps.meta.outputs.sha_tag }}"
          echo "${{ steps.meta.outputs.branch_tag }}"
          echo "${{ steps.meta.outputs.latest_tag }}"

      - name: Configure SSH
        if: ${{ inputs.publish-image && inputs.deploy }}
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to server
        if: ${{ inputs.publish-image && inputs.deploy }}
        env:
          SHA_TAG: ${{ steps.meta.outputs.sha_tag }}
          DEPLOY_CONTAINER_NAME: ${{ inputs.deploy-container-name || inputs.image-name }}
          DEPLOY_IMAGE_NAME: ${{ inputs.deploy-image-name || steps.meta.outputs.image_name }}
          DEPLOY_RUN_OPTIONS: ${{ inputs.deploy-run-options }}
          DEPLOY_HEALTHCHECK_URL: ${{ inputs.deploy-healthcheck-url }}
          DEPLOY_HEALTHCHECK_TIMEOUT_SECONDS: ${{ inputs.deploy-healthcheck-timeout-seconds }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          SSH_USER: ${{ vars.SSH_USER }}
        shell: bash
        run: |
          {
            printf 'set -euo pipefail\n'
            printf 'SHA_TAG=%q\n' "$SHA_TAG"
            printf 'DEPLOY_CONTAINER_NAME=%q\n' "$DEPLOY_CONTAINER_NAME"
            printf 'DEPLOY_IMAGE_NAME=%q\n' "$DEPLOY_IMAGE_NAME"
            printf 'DEPLOY_RUN_OPTIONS=%q\n' "$DEPLOY_RUN_OPTIONS"
            printf 'DEPLOY_HEALTHCHECK_URL=%q\n' "$DEPLOY_HEALTHCHECK_URL"
            printf 'DEPLOY_HEALTHCHECK_TIMEOUT_SECONDS=%q\n' "$DEPLOY_HEALTHCHECK_TIMEOUT_SECONDS"
            printf 'GHCR_USERNAME=%q\n' "$GHCR_USERNAME"
            printf 'GHCR_TOKEN=%q\n' "$GHCR_TOKEN"
            cat << 'EOF'

            DOCKER_CONFIG="$(mktemp -d)"
            export DOCKER_CONFIG
            trap 'rm -rf "$DOCKER_CONFIG"' EXIT

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$SHA_TAG"
            docker tag "$SHA_TAG" "$DEPLOY_IMAGE_NAME:latest"
            docker stop "$DEPLOY_CONTAINER_NAME" || true
            docker rm "$DEPLOY_CONTAINER_NAME" || true
            docker run -d --name "$DEPLOY_CONTAINER_NAME" $DEPLOY_RUN_OPTIONS "$DEPLOY_IMAGE_NAME:latest"

            deadline=$((SECONDS + DEPLOY_HEALTHCHECK_TIMEOUT_SECONDS))
            while [ "$SECONDS" -lt "$deadline" ]; do
              if [ "$(docker inspect -f '{{.State.Running}}' "$DEPLOY_CONTAINER_NAME" 2>/dev/null)" = "true" ]; then
                break
              fi
              sleep 2
            done

            if [ "$(docker inspect -f '{{.State.Running}}' "$DEPLOY_CONTAINER_NAME" 2>/dev/null)" != "true" ]; then
              docker logs --tail 100 "$DEPLOY_CONTAINER_NAME" || true
              exit 1
            fi

            docker_health_status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{end}}' "$DEPLOY_CONTAINER_NAME" 2>/dev/null)"
            if [ -n "$docker_health_status" ]; then
              deadline=$((SECONDS + DEPLOY_HEALTHCHECK_TIMEOUT_SECONDS))
              while [ "$SECONDS" -lt "$deadline" ]; do
                docker_health_status="$(docker inspect -f '{{.State.Health.Status}}' "$DEPLOY_CONTAINER_NAME" 2>/dev/null)"
                if [ "$docker_health_status" = "healthy" ]; then
                  break
                fi
                if [ "$docker_health_status" = "unhealthy" ]; then
                  docker logs --tail 100 "$DEPLOY_CONTAINER_NAME" || true
                  exit 1
                fi
                sleep 2
              done

              if [ "$docker_health_status" != "healthy" ]; then
                docker logs --tail 100 "$DEPLOY_CONTAINER_NAME" || true
                exit 1
              fi
            fi

            if [ -n "$DEPLOY_HEALTHCHECK_URL" ]; then
              deadline=$((SECONDS + DEPLOY_HEALTHCHECK_TIMEOUT_SECONDS))
              while [ "$SECONDS" -lt "$deadline" ]; do
                if curl --fail --silent --show-error --output /dev/null "$DEPLOY_HEALTHCHECK_URL"; then
                  exit 0
                fi
                sleep 2
              done

              docker logs --tail 100 "$DEPLOY_CONTAINER_NAME" || true
              exit 1
            fi

            exit 0
          EOF
          } | ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash -s
