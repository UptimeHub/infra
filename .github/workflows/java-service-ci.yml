name: Java Service CI/CD

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: '25'

      working-directory:
        required: false
        type: string
        default: '.'

      image-name:
        required: true
        type: string

      dockerfile:
        required: false
        type: string
        default: "."

      docker-context:
        required: false
        type: string
        default: "."

      publish-image:
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  build-test-and-publish-image:
    name: Build, Test and Publish Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
         distribution: temurin
         java-version: ${{ inputs.java-version }}
         cache: maven

      - name: Build and Test with Maven
        working-directory: ${{ inputs.working-directory }}
        run: mvn -B clean verify

      - name: Set image tags
        id: meta
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}"
          SHA_TAG="${IMAGE_NAME}:${{ github.sha }}"
          BRANCH_TAG="${IMAGE_NAME}:${GITHUB_REF_NAME//\//-}"
          
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "branch_tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"
          
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "latest_tag=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "latest_tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Github Container Registry
        if: ${{ inputs.publish-image }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ inputs.publish-image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.branch_tag }}
            ${{ steps.meta.outputs.latest_tag }}

      - name: Print published image
        if: ${{ inputs.publish-image }}
        run: |
          echo "Published:"
          echo "${{ steps.meta.outputs.sha_tag }}"
          echo "${{ steps.meta.outputs.branch_tag }}"
          echo "${{ steps.meta.outputs.latest_tag }}"